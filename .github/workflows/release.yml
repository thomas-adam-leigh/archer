name: Release

# Delivery loop: on merge to main, re-run the gates, build + sign + push images,
# then (behind a manual Environment gate) tell Komodo to redeploy.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never abort a half-finished deploy

jobs:
  # Re-assert the same gates on the merged commit (defence in depth vs. direct pushes).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome ci .
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm -r build
      - name: DB contract drift gate
        run: bash packages/db/scripts/gen-types.sh --check

  # Apply pending migrations to Supabase. Runs after verify, whose drift gate
  # (gen-types.sh --check on an ephemeral postgres) already proved the committed
  # @archer/db types match the migrations — so there is nothing to regenerate
  # here; after `db push` the remote DB matches those same migrations. The
  # explicit --dry-run shows what will be applied before touching the database.
  migrate:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pinned: `latest` resolution intermittently 504s (Gateway Time-out) and
          # is non-reproducible. Bump deliberately.
          version: 2.107.0
      # `db push` connects directly to Postgres, so it needs the linked project
      # (via `supabase link`) plus the DB password — `--project-ref` is NOT a
      # `db push` flag. SUPABASE_DB_PASSWORD is read from the env by the CLI.
      - name: Link to the Supabase project
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
      - name: Dry-run — list migrations that will be applied
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --dry-run
      - name: Apply migrations to Supabase
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
      # Deploy edge functions on merge, mirroring migrations-on-merge: the real
      # STT function (ARC-53). Deploy only uploads code, so it needs the access
      # token + project ref but not the runtime ELEVENLABS_API_KEY (provisioned
      # separately as a Supabase secret).
      - name: Deploy edge functions to Supabase
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy transcribe --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

  # Build, SBOM, provenance, sign, push. One job per service image.
  release:
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing via OIDC
    strategy:
      fail-fast: false
      matrix:
        # `web` ships a different Dockerfile path + public VITE_ build-args; api/cli
        # follow the services/<name>/Dockerfile convention with no build-args.
        include:
          - service: api
            dockerfile: services/api/Dockerfile
          - service: cli
            dockerfile: services/cli/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
            # PUBLIC client config (project URL, publishable key, API base URL) —
            # Vite inlines these into the browser bundle, so they are not secrets.
            build-args: |
              VITE_SUPABASE_URL=https://djyuqyiblzcsrqcirqgp.supabase.co
              VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_cihNfzHSXESWAf0-PWIJYQ_ES5YRaUG
              VITE_ARCHER_API_URL=https://api.archer.careers
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/archer-${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - name: Build + push (with SBOM + SLSA provenance)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: mode=max
          sbom: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/archer-${{ matrix.service }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
        # Verify later with:
        #   cosign verify ghcr.io/<owner>/archer-<svc>@<digest> \
        #     --certificate-identity-regexp 'https://github.com/<owner>/archer/.*' \
        #     --certificate-oidc-issuer https://token.actions.githubusercontent.com

  # Tell Komodo to pull + redeploy. Manual-approval Environment = the Proposal gate.
  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: production # configure required reviewers in repo Settings → Environments
      url: https://build.n8n.computer
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Komodo redeploy
        env:
          KOMODO_URL: ${{ secrets.KOMODO_URL }}
          KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
          KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
          KOMODO_PROCEDURE: ${{ vars.KOMODO_PROCEDURE }}
          SHA: ${{ github.sha }}
          # Pin each stack to the exact image this release built + signed, so the
          # redeploy is deterministic instead of re-pulling a stale tag.
          ARCHER_API_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/archer-api:sha-${{ github.sha }}
          ARCHER_WEB_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/archer-web:sha-${{ github.sha }}
        run: bash infra/komodo/scripts/redeploy.sh
      - name: Record deploy as an Activity (best-effort)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          DEPLOY_STATUS: ${{ job.status }}
          SHA: ${{ github.sha }}
        run: bash infra/komodo/scripts/record-deploy-activity.sh
