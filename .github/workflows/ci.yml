name: CI

# Integration loop: runs on every PR and on feature-branch pushes.
# Pushes to `main` are handled by release.yml (which calls these same gates first).
on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads PR file lists via the API

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Keep Cypress (a devDep of apps/web) from downloading its ~300 MB binary during the
# backend `pnpm install --frozen-lockfile` — only the dedicated web-e2e job fetches it
# (via cypress-io/github-action, which caches it). Stops Cypress bloating/breaking CI.
env:
  CYPRESS_INSTALL_BINARY: "0"

jobs:
  # ── Change detection ────────────────────────────────────────────────────────
  # Gate each downstream job so a docs-only PR doesn't rebuild the world.
  changes:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.filter.outputs.node }}
      web: ${{ steps.filter.outputs.web }}
      python: ${{ steps.filter.outputs.python }}
      db: ${{ steps.filter.outputs.db }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Backend Node workspace (services + packages). apps/web has its own
            # `web` job below; apps/mobile builds standalone; apps/agent isn't a
            # workspace package — so none belong to the backend `node` gate.
            node:
              - 'services/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'biome.json'
              - 'vitest.config.ts'
              - '.github/workflows/ci.yml'
            # The TanStack Start web app — its own biome + tsc + build gate.
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            python:
              - '**/*.py'
              - '**/pyproject.toml'
              - '**/uv.lock'
              - 'ruff.toml'
            db:
              - 'packages/db/**'
            docker:
              - '**/Dockerfile'
              - '.dockerignore'

  # ── Node: lint · typecheck · test · build ───────────────────────────────────
  node:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint + format check (Biome)
        run: pnpm exec biome ci .
      - name: Typecheck
        run: pnpm run typecheck
      - name: Unit tests (Vitest)
        run: pnpm run test
      # Build affected packages since the base. At this scale a full `-r build`
      # is fine; swap to `--filter "...[origin/main]"` (or Turborepo) when it's slow.
      - name: Build
        run: pnpm -r build

  # ── Web (apps/web): the TanStack Start onboarding app ───────────────────────
  # apps/web keeps its OWN biome config (tab indent, recommended lint) and is
  # excluded from the backend biome, so it's linted/typechecked/built here with
  # its own tooling. Cypress E2E is a separate, non-required `web-e2e` job (ARC-93).
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint + format check (Biome, web config)
        run: pnpm --filter web exec biome check .
      - name: Typecheck
        run: pnpm --filter web exec tsc --noEmit
      - name: Build
        run: pnpm --filter web build

  # ── Web E2E (apps/web): Cypress — NON-REQUIRED until M9 (ARC-93) ─────────────
  # Path-filtered to apps/web (+ this workflow) so it never runs on unrelated
  # PRs, and deliberately NOT in the `ci-ok` gate, so a flaky E2E can't block a
  # merge until the suite is promoted (ARC-118).
  #
  # The pnpm workspace lockfile lives at the repo root, so we install deps + the
  # Cypress binary ourselves (the action's own install only detects a lockfile
  # inside its working-directory) and run the action with `install: false`. It
  # still does the build -> serve -> wait-on -> run dance so specs never race the
  # server. This job overrides the workflow-level CYPRESS_INSTALL_BINARY=0 (which
  # keeps the ~300 MB binary out of the heavy `node` install) so the binary here
  # does download, into the cached ~/.cache/Cypress.
  web-e2e:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    env:
      CYPRESS_INSTALL_BINARY: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the Cypress binary (the classic "Cannot find cached binary"
      # failure, gh#474), then install it for the web workspace.
      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: cypress-${{ runner.os }}-
      - name: Install Cypress binary
        run: pnpm --filter web exec cypress install
      - name: Cypress (build → serve → wait-on → e2e)
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/web
          install: false
          build: pnpm build
          start: pnpm serve
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            apps/web/cypress/videos
            apps/web/cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

  # ── Database: the contract drift gate ───────────────────────────────────────
  # Regenerate types from the migrations against an ephemeral Postgres and fail
  # if the committed packages/db/src/database.types.ts is stale. This is what
  # enforces "the database is the contract" across the polyglot repo.
  db:
    needs: changes
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Drift gate — types must match migrations
        run: bash packages/db/scripts/gen-types.sh --check
      - name: Migration lint (squawk)
        run: bash packages/db/scripts/lint-migrations.sh

  # ── Python: dormant until the Archer CLI (Patchwright) lands ─────────────────────────
  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint + format check
        run: |
          uvx ruff check .
          uvx ruff format --check .
      - name: Tests (pytest)
        run: |
          if find . -name pyproject.toml -not -path '*/node_modules/*' | grep -q .; then
            uvx --with pytest pytest
          else
            echo "no Python project yet — skipping pytest"
          fi

  # ── Docker: lint + build affected images (no push) ──────────────────────────
  docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, cli]
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/${{ matrix.service }}/Dockerfile
      - uses: docker/setup-buildx-action@v3
      - name: Build image (validate, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Security: secrets + vulnerabilities ─────────────────────────────────────
  # Scanners gate directly (no SARIF upload), so this needs no GitHub Advanced
  # Security and works on a private repo.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for secret scanning
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Vulnerability + misconfig scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

  # ── Required status check (point branch protection at this one) ─────────────
  ci-ok:
    needs: [changes, node, web, db, python, docker, security]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job result was '$r'."
              exit 1
            fi
          done
          echo "All required jobs passed (or were skipped)."
