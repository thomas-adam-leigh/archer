title = "Archer gitleaks config"

# Start from gitleaks' bundled rules, then narrow false positives below.
[extend]
useDefault = true

[allowlist]
description = "Archer allowlist"
paths = [
  '''\.env\.example$''',
  '''pnpm-lock\.yaml$''',
  # Supabase local config uses env(...) placeholders and empty stubs, not real secrets.
  '''packages/db/supabase/config\.toml$''',
]
regexes = [
  # Supabase PUBLISHABLE keys are public by design — they ship in the web client
  # bundle and are pinned as a build-arg in release.yml. The SECRET key prefix
  # (sb_secret_) is deliberately NOT allowlisted, so real secrets still trip.
  '''sb_publishable_[A-Za-z0-9_-]+''',
]
