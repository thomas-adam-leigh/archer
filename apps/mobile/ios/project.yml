name: ArcherMobile
options:
  bundleIdPrefix: dev.archer
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
targets:
  ArcherMobile:
    type: application
    platform: iOS
    sources:
      - path: ArcherMobile
        excludes:
          - "Resources/main.lynx.bundle"
      - path: ArcherMobile/Resources/main.lynx.bundle
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.archer.mobile
        DEVELOPMENT_TEAM: 4A4867C5VC
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: ArcherMobile/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
