# Deploys the GHCR image that GitHub Actions built + signed (release.yml).
# Komodo owns runtime; it pulls this image, it does NOT build it.
#
# Unlike archer-api this stack has NO runtime secrets: the web client's config
# (Supabase URL, publishable key, API base) is PUBLIC and baked into the bundle at
# build time (see apps/web/Dockerfile build-args), so there is nothing to inject here.
name: archer-web
services:
  web:
    image: ${ARCHER_WEB_IMAGE:-ghcr.io/thomas-adam-leigh/archer-web:latest}
    container_name: archer-web
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    # Bound to loopback; the host's Caddy reverse-proxies TLS to it (app.archer.careers).
    ports:
      - "127.0.0.1:9127:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
