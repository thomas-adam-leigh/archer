# ============================================================================
# Archer — Komodo GitOps resource definitions
# ============================================================================
# This file is the source of truth for Archer's runtime on Komodo. A Komodo
# ResourceSync reads it from the repo and reconciles Komodo to match.
#
# SAFETY: the sync is intentionally NON-managed (no auto-delete). The Archer box
# also runs sibling stacks (finance, job-hunter, n8n, shelby, akuna-matata) and
# the existing `archer` (hermes-agent) stack. This sync only ADDS the resources
# below; review the diff in the Komodo UI before executing the first sync.
#
# Separation of concerns: GitHub Actions BUILDS + SIGNS images (release.yml).
# Komodo only DEPLOYS them. There is deliberately no [[build]] here.
# ============================================================================

# --- Pinned image tags (release.yml can update these to a :sha for traceability) ---
[[variable]]
name = "ARCHER_API_IMAGE"
description = "GHCR image deployed for archer-api. Pin to a :sha-<commit> for rollback."
value = "ghcr.io/thomas-adam-leigh/archer-api:latest"

[[variable]]
name = "ARCHER_WEB_IMAGE"
description = "GHCR image deployed for archer-web. Pin to a :sha-<commit> for rollback."
value = "ghcr.io/thomas-adam-leigh/archer-web:latest"

# --- archer-api is INTENTIONALLY NOT synced here (Komodo-native) ---
# Its runtime secrets (ARCHER_API_SECRET, SUPABASE_*, DATABASE_URL, *_API_KEY) live
# ONLY in Komodo's managed stack env — never in git. A ResourceSync reconciles a
# stack's `environment` to whatever the TOML declares; since we cannot commit those
# secrets, this file would declare an EMPTY env and the sync would WIPE them, crash-
# looping the API ("ARCHER_API_SECRET must be set"). That happened 2026-06-24.
#
# So archer-api is managed natively in Komodo (like the sibling stacks finance/n8n):
# the sync leaves it untouched. Its compose is still version-controlled at
# infra/komodo/compose/archer-api.compose.yaml, and release.yml → redeploy.sh
# deploys it via the `archer-deploy` procedure below (a partial env update that
# preserves the secrets). To recreate it: make a Komodo stack `archer-api` on
# server "computer" from that compose, then set its managed env (the secrets).
# archer-web (below) carries NO secrets, so it is safe to sync.

# --- The deployable web app (TanStack Start; pulls the GHCR image, never built here) ---
[[stack]]
name = "archer-web"
description = "Archer web app — built + signed by GitHub Actions, deployed by Komodo. Public config baked at build; no runtime secrets."
tags = ["archer"]

[stack.config]
server = "computer"
git_provider = "github.com"
git_account = "thomas-adam-leigh"
repo = "thomas-adam-leigh/archer"
branch = "main"
run_directory = "infra/komodo/compose"
file_paths = ["archer-web.compose.yaml"]
auto_pull = true            # pull the fresh image on deploy
run_build = false           # Komodo does not build — Actions does
webhook_enabled = true      # allow release.yml to trigger redeploys
send_alerts = true
poll_for_updates = true

# --- The deploy procedure release.yml invokes (deploy → smoke test) ---
[[procedure]]
name = "archer-deploy"
description = "Pull + redeploy archer-api + archer-web, then smoke-test the API. Self-heals on failure via the alerter."
tags = ["archer"]

[[procedure.config.stage]]
name = "Deploy"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "archer-api", enabled = true },
  { execution.type = "DeployStack", execution.params.stack = "archer-web", enabled = true },
]

[[procedure.config.stage]]
name = "Smoke test"
enabled = true
executions = [
  { execution.type = "RunAction", execution.params.action = "archer-smoke", enabled = true },
]

# --- Post-deploy smoke test (Deno). Source of truth: actions/archer-smoke.ts ---
[[action]]
name = "archer-smoke"
description = "Fail the deploy (and alert) if archer-api isn't healthy after release."
tags = ["archer"]

[action.config]
file_contents = '''
// Keep in sync with infra/komodo/actions/archer-smoke.ts
const url = Deno.env.get("ARCHER_API_HEALTH_URL") ?? "http://host.docker.internal:9125/health";
const deadline = Date.now() + 60_000;
while (Date.now() < deadline) {
  try {
    const res = await fetch(url);
    if (res.ok) { console.log(`OK archer-api healthy at ${url}`); Deno.exit(0); }
    console.log(`... ${url} -> ${res.status}`);
  } catch (err) { console.log(`... ${url} unreachable (${err})`); }
  await new Promise((r) => setTimeout(r, 3000));
}
console.error("archer-api did not become healthy within 60s");
Deno.exit(1);
'''

# --- Failure notifications (point endpoint at n8n / Discord / ntfy as you like) ---
[[alerter]]
name = "archer-alerts"
description = "Build/deploy/health failures for Archer."
tags = ["archer"]

[alerter.config]
enabled = true
endpoint.type = "Slack"
endpoint.params.url = "[[ARCHER_ALERT_WEBHOOK]]"  # a Komodo Secret, not committed

# --- The sync resource itself (so GitOps is self-describing) ---
# Non-managed: Komodo shows a diff you execute manually; it will NOT delete the
# sibling stacks. Flip to managed only once you're confident in the scope.
[[resource_sync]]
name = "archer-gitops"
description = "Syncs Archer's Komodo resources from infra/komodo in the archer repo."
tags = ["archer"]

[resource_sync.config]
git_provider = "github.com"
git_account = "thomas-adam-leigh"
repo = "thomas-adam-leigh/archer"
branch = "main"
resource_path = ["infra/komodo"]
managed = false
